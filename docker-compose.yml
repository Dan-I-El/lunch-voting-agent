services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lunch-voting-agent
    ports:
      - ${APP_PORT}:${APP_PORT}
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - USER_OAUTH_TOKEN=${USER_OAUTH_TOKEN}
      - APP_ENV=local
    develop:
      watch:
        - action: rebuild
          path: ./src

    depends_on:
      database:
        condition: service_healthy
  database:
    image: postgres:17
    container_name: lunch-voting-database
    ports:
      - "5435:5432"
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST_AUTH_METHOD
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
